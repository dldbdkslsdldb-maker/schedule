<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2026년 여름휴가 일정</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      font-size: 18px;
      background: #000000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .dashboard {
      background: linear-gradient(160deg, #e8eeff 0%, #ddeeff 50%, #e4f0fb 100%);
      border-radius: 20px;
      padding: 36px 40px 40px;
      width: 100%;
      max-width: 1100px;
      box-shadow: 0 12px 56px rgba(0,0,0,0.35);
    }

    .header {
      text-align: center;
      margin-bottom: 22px;
    }
    .header h1 {
      font-size: 52px;
      font-weight: 800;
      color: #1042a0;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px rgba(16,66,160,0.10);
    }
    .header p {
      font-size: 28px;
      color: #5c7bbf;
      margin-top: 6px;
      font-weight: 600;
    }

    /* 범례 */
    .legend {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
      min-height: 10px;
    }
    .legend-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(100,140,220,0.18);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      color: #334e7a;
      backdrop-filter: blur(4px);
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── 캘린더 래퍼 ── */
    #calWrapper {
      position: relative;
    }

    /* ── 캘린더 그리드 ── */
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .day-header {
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      padding: 7px 0;
      border-radius: 8px;
      letter-spacing: 1px;
    }
    .day-header.sun  { color: #c62828; background: #fcd5d5; }
    .day-header.sat  { color: #1042a0; background: #c5d5f5; }
    .day-header.wday { color: #2c3e6b; background: #d0daf0; }

    .day-cell {
      background: rgba(255,255,255,0.55);
      border: 1.5px solid rgba(120,160,220,0.30);
      border-radius: 12px;
      padding: 10px 8px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
      user-select: none;
      backdrop-filter: blur(2px);
    }
    .day-cell.sun  { background: rgba(255,235,235,0.60); border-top: 3px solid #e57373; }
    .day-cell.sat  { background: rgba(220,232,255,0.60); border-top: 3px solid #5c8de8; }
    .day-cell.wday { border-top: 3px solid #7b9fd4; }

    .date-label {
      display: flex;
      align-items: baseline;
      gap: 4px;
      flex-shrink: 0;
    }
    .date-num {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
      color: #1e3460;
    }
    .day-cell.sun .date-num { color: #c62828; }
    .day-cell.sat .date-num { color: #1042a0; }
    .date-month { font-size: 12px; color: #6e8ab5; }

    .bar-space { flex-shrink: 0; }

    .events-area { flex: 1; display: flex; flex-direction: column; gap: 3px; }

    .event-chip {
      border-left: 3px solid;
      border-radius: 6px;
      padding: 3px 7px;
      font-size: 13px;
      font-weight: 500;
      color: #1a2a4a;
      word-break: break-all;
    }

    /* 절대 위치 기간 바 */
    .ev-bar {
      position: absolute;
      z-index: 10;
      display: flex;
      align-items: center;
      padding: 0 10px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.22);
      user-select: none;
    }
  </style>
</head>
<body>

<div class="dashboard">
  <div class="header">
    <h1>☀️ 2026년 여름휴가 일정</h1>
    <p>07.26 ~ 08.08</p>
  </div>
  <div class="legend" id="legend"></div>
  <div id="calWrapper">
    <div class="calendar" id="calendar"></div>
  </div>
</div>

<script>
  /* ── 상수 ── */
  const COLORS = [
    { name: '파랑',    hex: '#1e88e5' },
    { name: '초록',    hex: '#43a047' },
    { name: '주황',    hex: '#fb8c00' },
    { name: '핑크',    hex: '#e91e8c' },
    { name: '보라',    hex: '#8e24aa' },
    { name: '청록',    hex: '#00acc1' },
    { name: '노랑',    hex: '#f9a825' },
    { name: '빨강',    hex: '#e53935' },
    { name: '연두',    hex: '#7cb342' },
    { name: '하늘',    hex: '#039be5' },
    { name: '살구',    hex: '#ff7043' },
    { name: '자주',    hex: '#c2185b' },
    { name: '민트',    hex: '#00897b' },
    { name: '코랄',    hex: '#ef5350' },
    { name: '라벤더',  hex: '#7e57c2' },
    { name: '황금',    hex: '#f57f17' },
  ];
  const DAYS      = ['일', '월', '화', '수', '목', '금', '토'];
  const DAY_CLASS = ['sun', 'wday', 'wday', 'wday', 'wday', 'wday', 'sat'];
  const START     = new Date(2026, 6, 26);
  const SLOT_H    = 24;
  const BAR_H     = 20;
  const DATE_ROW  = 34;

  /* ── 데이터 ── */
  let events = JSON.parse(localStorage.getItem('vacEvents2026v2') || '[]');

  /* ── 유틸 ── */
  function dKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function cellDate(i) {
    const d = new Date(START);
    d.setDate(START.getDate() + i);
    return d;
  }
  function dateToIdx(key) {
    const d = new Date(key + 'T00:00:00');
    const diff = Math.round((d - START) / 86400000);
    return (diff >= 0 && diff < 14) ? diff : -1;
  }
  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtDate(key) {
    const [,m,d] = key.split('-');
    return `${parseInt(m)}/${parseInt(d)}`;
  }

  /* ── 슬롯 계산 ── */
  function computeMaxSlots() {
    const result = [0, 0];
    for (let row = 0; row < 2; row++) {
      const rS = row * 7, rE = rS + 6;
      const slotEnd = [];
      events
        .filter(ev => {
          const si = dateToIdx(ev.start), ei = dateToIdx(ev.end);
          return si < ei && si <= rE && ei >= rS;
        })
        .sort((a, b) => dateToIdx(a.start) - dateToIdx(b.start))
        .forEach(ev => {
          const si = Math.max(dateToIdx(ev.start), rS);
          let slot = 0;
          while (slot < slotEnd.length && slotEnd[slot] >= si) slot++;
          if (slot === slotEnd.length) slotEnd.push(-1);
          slotEnd[slot] = Math.min(dateToIdx(ev.end), rE);
          result[row] = Math.max(result[row], slot + 1);
        });
    }
    return result;
  }

  /* ── 캘린더 렌더 ── */
  function buildCalendar() {
    const maxSlots = computeMaxSlots();
    const cal = document.getElementById('calendar');
    cal.innerHTML = '';
    document.querySelectorAll('.ev-bar').forEach(el => el.remove());

    DAYS.forEach((d, i) => {
      const h = document.createElement('div');
      h.className = `day-header ${DAY_CLASS[i]}`;
      h.textContent = d;
      cal.appendChild(h);
    });

    for (let i = 0; i < 14; i++) {
      const date  = cellDate(i);
      const dow   = date.getDay();
      const key   = dKey(date);
      const month = date.getMonth() === 6 ? '7월' : '8월';
      const row   = Math.floor(i / 7);
      const slotSpace = maxSlots[row] * SLOT_H;

      const cell = document.createElement('div');
      cell.id = 'dc-' + i;
      cell.className = `day-cell ${DAY_CLASS[dow]}`;

      const lbl = document.createElement('div');
      lbl.className = 'date-label';
      lbl.innerHTML = `<span class="date-num">${date.getDate()}</span><span class="date-month">${month}</span>`;
      cell.appendChild(lbl);

      if (slotSpace > 0) {
        const spacer = document.createElement('div');
        spacer.className = 'bar-space';
        spacer.style.height = slotSpace + 'px';
        cell.appendChild(spacer);
      }

      const area = document.createElement('div');
      area.className = 'events-area';
      events
        .filter(ev => ev.start === ev.end && ev.start === key)
        .forEach(ev => {
          const chip = document.createElement('div');
          chip.className = 'event-chip';
          chip.style.borderLeftColor = ev.color || COLORS[0].hex;
          chip.style.background = (ev.color || COLORS[0].hex) + '18';
          chip.innerHTML = `<span>${escHtml(ev.text)}</span>`;
          area.appendChild(chip);
        });
      cell.appendChild(area);
      cal.appendChild(cell);
    }

    requestAnimationFrame(() => requestAnimationFrame(() => drawRangeBars(maxSlots)));
    buildLegend();
  }

  /* ── 기간 바 렌더링 ── */
  function drawRangeBars(maxSlots) {
    document.querySelectorAll('.ev-bar').forEach(el => el.remove());
    const wrapper = document.getElementById('calWrapper');
    const wRect   = wrapper.getBoundingClientRect();

    for (let row = 0; row < 2; row++) {
      const rS = row * 7, rE = rS + 6;
      const slotEnd = [];

      events
        .filter(ev => {
          const si = dateToIdx(ev.start), ei = dateToIdx(ev.end);
          return si < ei && si <= rE && ei >= rS;
        })
        .sort((a, b) => dateToIdx(a.start) - dateToIdx(b.start))
        .forEach(ev => {
          const si = Math.max(dateToIdx(ev.start), rS);
          const ei = Math.min(dateToIdx(ev.end), rE);

          let slot = 0;
          while (slot < slotEnd.length && slotEnd[slot] >= si) slot++;
          if (slot === slotEnd.length) slotEnd.push(-1);
          slotEnd[slot] = ei;

          const fromEl = document.getElementById('dc-' + si);
          const toEl   = document.getElementById('dc-' + ei);
          if (!fromEl || !toEl) return;

          const fr = fromEl.getBoundingClientRect();
          const tr = toEl.getBoundingClientRect();
          const PAD  = 3;
          const left  = fr.left - wRect.left + PAD;
          const top   = fr.top  - wRect.top  + DATE_ROW + slot * SLOT_H + (SLOT_H - BAR_H) / 2;
          const width = tr.right - fr.left - PAD * 2;
          const isContinued = dateToIdx(ev.start) < rS;

          const bar = document.createElement('div');
          bar.className = 'ev-bar';
          bar.title = `${ev.text}  (${fmtDate(ev.start)} ~ ${fmtDate(ev.end)})`;
          bar.style.cssText =
            `left:${left}px;top:${top}px;width:${width}px;height:${BAR_H}px;background:${ev.color};`;
          bar.textContent = isContinued ? `↪ ${ev.text}` : ev.text;
          wrapper.appendChild(bar);
        });
    }
  }

  /* ── 범례 ── */
  function buildLegend() {
    const legend = document.getElementById('legend');
    legend.innerHTML = '';
    events.filter(ev => ev.start < ev.end).forEach(ev => {
      const chip = document.createElement('div');
      chip.className = 'legend-chip';
      chip.innerHTML = `<span class="legend-dot" style="background:${ev.color}"></span>
        ${escHtml(ev.text)}
        <span style="color:#b0bec5;font-size:12px">&nbsp;${fmtDate(ev.start)} ~ ${fmtDate(ev.end)}</span>`;
      legend.appendChild(chip);
    });
  }

  /* ── storage 이벤트 (관리자 탭에서 변경 시 자동 반영) ── */
  window.addEventListener('storage', e => {
    if (e.key === 'vacEvents2026v2') {
      events = JSON.parse(e.newValue || '[]');
      buildCalendar();
    }
  });

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(buildCalendar, 150);
  });

  buildCalendar();
</script>
</body>
</html>
